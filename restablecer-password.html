<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — Rosca Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{font-family:'Poppins',sans-serif;background:#0A1428;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 44px;width:100%;max-width:400px;text-align:center;}
.title{font-family:'Poppins',sans-serif;font-size:28px;letter-spacing:3px;color:#E8A020;margin-bottom:6px;}
.sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
.field{margin-bottom:14px;text-align:left;}
.field label{display:block;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:5px;}
.field input{width:100%;padding:11px 14px;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;outline:none;}
.field input:focus{border-color:#E8A020;}
.btn{width:100%;padding:13px;background:#E8A020;color:#0D1B3E;border:none;border-radius:11px;font-family:'Poppins',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;margin-top:8px;}
.msg{font-size:13px;font-weight:700;padding:10px;border-radius:8px;margin-top:12px;display:none;}
.msg.success{background:rgba(22,163,74,0.15);color:#4ADE80;border:1px solid rgba(22,163,74,0.3);}
.msg.error{background:rgba(206,17,38,0.15);color:#FF6B6B;border:1px solid rgba(206,17,38,0.3);}
body.dia{background:#f0f4f8;color:#0f172a;}
body.dia .box{background:#ffffff;border-color:#c5d0e0;}
body.dia .box input{background:rgba(0,0,0,0.05);border-color:#c5d0e0;color:#0f172a;}
body.dia .box input:focus{border-color:#1e3a8a;}
body.dia .box label{color:#4a5568;}
body.dia .box .sub{color:#4a5568;}
.btn-tema-fixed{position:fixed;top:14px;right:14px;z-index:999;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
body.dia .btn-tema-fixed{background:rgba(0,0,0,0.08);border-color:rgba(0,0,0,0.15);color:#333;}
</style>
</head>
<body>
<button class="btn-tema-fixed" id="btnTema" onclick="toggleTema()" title="Cambiar modo día/noche">🌙</button>
<div class="box">
  <div class="title">NUEVA CONTRASEÑA</div>
  <div class="sub">Rosca Mundial 2026</div>
  <div class="field">
    <label>Nueva contraseña</label>
    <input type="password" id="pass1" placeholder="Mín. 8 caracteres">
  </div>
  <div class="field">
    <label>Confirmar contraseña</label>
    <input type="password" id="pass2" placeholder="Repite tu contraseña">
  </div>
  <button class="btn" onclick="cambiar()">GUARDAR CONTRASEÑA</button>
  <div class="msg" id="msg"></div>
</div>

<script>
function toggleTema() {
  const esDia = document.body.classList.toggle('dia');
  document.getElementById('btnTema').textContent = esDia ? '☀️' : '🌙';
  localStorage.setItem('rosca-tema', esDia ? 'dia' : 'noche');
}
(function() {
  const t = localStorage.getItem('rosca-tema');
  if (t === 'dia') {
    document.body.classList.add('dia');
    const btn = document.getElementById('btnTema');
    if (btn) btn.textContent = '☀️';
  }
})();
</script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  'https://hwhlmuixnxevzbabkqcy.supabase.co',
  'sb_publishable_Sub3P-1VhdcnNfhNzeet1A_yhQt_wJS'
);

let sesionLista = false;

// Escuchar el evento PASSWORD_RECOVERY que Supabase dispara
// al detectar el token de recuperación en el hash de la URL
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    sesionLista = true;
    // Mostrar el formulario (ya visible por defecto, pero confirma que el token es válido)
    const msg = document.getElementById('msg');
    msg.textContent = '🔑 Enlace válido. Ingresa tu nueva contraseña.';
    msg.className = 'msg success';
    msg.style.display = 'block';
  }
});

// También intentar inicializar desde hash manualmente (por si onAuthStateChange no dispara)
(async () => {
  const hash = window.location.hash.substring(1);
  if (hash.includes('access_token')) {
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (accessToken) {
      const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
      if (!error) sesionLista = true;
    }
  }
})();

window.cambiar = async function() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (!sesionLista) {
    // Verificar si hay sesión activa de todas formas
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      msg.textContent = 'El enlace expiró o ya fue usado. Solicita uno nuevo.';
      msg.className = 'msg error';
      msg.style.display = 'block';
      return;
    }
    sesionLista = true;
  }

  if (pass1.length < 8) {
    msg.textContent = 'La contraseña debe tener mínimo 8 caracteres';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  if (pass1 !== pass2) {
    msg.textContent = 'Las contraseñas no coinciden';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  const { error } = await supabase.auth.updateUser({ password: pass1 });

  if (error) {
    msg.textContent = 'Error al actualizar: ' + error.message;
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  msg.textContent = '✅ Contraseña actualizada. Redirigiendo...';
  msg.className = 'msg success';
  msg.style.display = 'block';
  setTimeout(() => window.location.href = '/login.html', 2000);
};
</script>
</body>
</html>
